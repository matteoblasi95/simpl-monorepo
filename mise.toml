[tools]
java = "21"
mvnd = "1.0.3"
jq = "1.8.1"
docker-compose = "2.39.4"
kubectl = "1.34.1"
docker-cli = "28.4.0"
helm = "3.19.0"
kubectx = "0.9.5"
kubens = "0.9.5"
minikube = "1.37.0"
yq = "4.47.2"
gomplate = "5.0.0"

[shell_alias]
path_fe = "rg -n --no-heading path: $(fd route  | grep microfe)"

[vars]
pathSimplRepo = "./simpl-repo"
pathSimplBackend = "{{vars.pathSimplRepo}}/backend"
pathHelmLocalAuthority = "{{vars.pathSimplRepo}}/docs/charts/app-values/local/local-authority"

run_mise_code_build = "mvnd -Dmvnd.connectTimeout=100000 clean install -fae -f {{vars.pathSimplBackend}}"
run_cluster_forward_node_compose = "docker-cli-plugin-docker-compose -f .config/docker/forward-node/docker-compose.yaml -p simpl-portforward"

zscaler_enabled = false
keycloak_secrets_wait = "300"

lib_extract_jar = """
function simpl_extract_jar_from_image() {
  local image="${1?missing image}"
  local pull_arg="${SIMPL_DOWNLOAD_PULL-0}"
  local cname=$(docker create $( [ "$pull_arg" -ne 0 ] && echo -n "--pull=always" ) "$image")
  trap "docker rm -v '$cname' >/dev/null 2>&1" EXIT
  docker export "$cname" | tar -xO app.jar
}

function simpl_extract_jar_from_image_to_file() {
  local image="${1?missing image}"
  local destination="${2?destination image}"
  local dir_destination="$(dirname "$destination")"
  mkdir -p "$dir_destination"
  simpl_extract_jar_from_image "$image" > "$destination"
}
"""

lib_keycloak = """
function echokpod() {
  echo -e "\\n⏳ Waiting for \\033[1;33mKeycloak\\033[0m status to become \\033[1;32mReady\\033[0m..."
  kubectl -n local-authority get statefulset | grep --color=always -E -e $ -e keycloak
  kubectl -n local-authority get pod | grep --color=always -E -e $ -e keycloak
}

function waitkpod() {
    local wait=$1
    for (( i = 0; i < $wait; i++ )); do
      echokpod
      if kubectl wait -n local-authority --for=jsonpath='{.status.availableReplicas}'=1 statefulset.apps/local-authority-keycloak --timeout=10s 2>/dev/null; then
        return 0
      fi
    done
    return 1
}

function getsecret() {
  local realm="$1"
  local client_id="${2-"cli"}"
     (
  >&2  echo "Retrieve secret $realm"
  kubectl exec -n local-authority local-authority-keycloak-0 -i -- bash -eb << EOF
  /opt/keycloak/bin/kcadm.sh get clients \
         -r "$realm" \
         -q clientId="$client_id" \
         --config /tmp/kcadm.config
EOF
  ) | jq -r .[].secret 
}

function keylogin() {
  kubectl exec -n local-authority local-authority-keycloak-0 -i -- bash -eb << EOF
    >&2 echo "Login to keycloak admin..."
    /opt/keycloak/bin/kcadm.sh config credentials \
           --config /tmp/kcadm.config \
           --server http://localhost:8080 \

           --realm master \
           --client admin-cli \
           --user admin \
           --password admin
EOF
}

function keycloak_update_attribute() {
  local realm="$1"
  local key="$2"
  local value="$3"
  kubectl exec -n local-authority local-authority-keycloak-0 -i -- bash -eb << EOF
  echo "Setting property [realm=$realm] [key=$key] [value=$value]"
  /opt/keycloak/bin/kcadm.sh update "realms/$realm" \
    --config /tmp/kcadm.config \
    -s "$key=$value"
EOF
}

function kcadm_remote() {
  local server
  local agent_type="${1?Missing agent type}"; shift;
  case "$agent_type" in
    auth|authority)
      tier=http://tier1-gateway-authority:8100/auth
    ;;
    part|cons|participant|consumer)
      tier=http://tier1-gateway-consumer:8100/auth
    ;;
    *)
      >&2 echo "Invalid agent type=[$agent_type]"
      return 1;
    ;;
  esac
  local action="${1?Missing action}"; shift;
  local name="$(kubectl -n local-authority get pod -l app.kubernetes.io/name=keycloak -ojsonpath={.items[].metadata.name} --sort-by {.metadata.creationTimestamp} | tail -n1)"
  kubectl -n local-authority exec -i "$name" -- ./opt/keycloak/bin/kcadm.sh "$action" --server http://localhost:8080 --realm master --user admin --password admin "$@" 
}
"""


[tasks."initialization:project"]
description = "Initializes the entire project environment by executing the following subtasks:"
run = [
  { task = "initialization:code" },
  { task = "initialization:cluster" },
]

[tasks."destruction:all"]
description = "Completely removes the development environment:"
run = [
  { tasks = [ "cluster:destroy", "cluster:forward-node-down", "zscaler:remove-jdk" ] },
]

[tasks."initialization:build:code"]
description = "Builds all projects without executing tests using Maven (`mvnd`)."
run = [
  "mvnd --stop",
  "mvnd clean install -N -f simpl-repo/backend/libs/common",
  "mvnd clean install -N -f simpl-repo/backend/libs/simpl-http-client",
  { task = "code:build:no-test" },
]

[tasks."initialization:code"]
description = "Initializes git submodules and updates all projects."
run = [
  { task = "git:init" },
  { task = "git:update-all" },
]

[tasks."initialization:cluster"]
description = "Creates the Minikube cluster, configures port forwarding, and installs or upgrades the authority chart."
run = [
  { task = "cluster:create" },
  { task = "initialization:zscaler" },
  { task = "cluster:forward-node-up" },
  { task = "cluster:authority-install-or-upgrade" },
  { task = "code:test-automation:autoconfigure-client-secret" },
  { task = "cluster:initialization_ejbca" },
  { task = "cluster:download_ejbca_pem" },
  { task = "config:prepare-files" },
  { task = "simpl-services:tier1-authority-up" },
  { task = "cluster:keycloak-autoconfigure" },
  { task = "simpl-services:up" },
  { task = "simpl-services-fe:up" },
  { task = "cluster:authority_initialization" },
]

[tasks."initialization:zscaler"]
description = "Configures the environment for Z-Scaler certificates:"
run = [
  { tasks = [ "zscaler:install-jdk", "zscaler:install-cluster" ] }
]

[tasks."jqlog"]
description = "Formats JSON log output to a readable line-by-line format using `jq`."
raw = true
quiet = true
run = """
jq --unbuffered -r -R '. as $line | try (fromjson | "\\(.timestamp) \\(.micro // "") \\(.level) \\(.message) \\(."error.stack_trace" // "")") catch $line'
"""

[tasks."code:fmt"]
description = "Formats the code using Spotless."
run = "mvnd -f {{vars.pathSimplBackend}} spotless:apply"

[tasks."code:build"]
description = "Builds all projects with Maven, including tests."
run = [
  "mvnd -Dmvnd.connectTimeout=100000 clean install -fae -f {{vars.pathSimplBackend}}",
 ]

[tasks."code:build:no-test"]
description = "Builds all projects but skips tests and license downloads."
run = "{{vars.run_mise_code_build}} --fail-never -Dlicense.skipDownloadLicenses -Dmaven.test.skip"

[tasks."code:test-automation:run-by-feature"]
description = "Runs automation tests filtered by Cucumber feature file."
run = "mvnd -f {{vars.pathSimplBackend}}/tests/test-automation resources:resources resources:testResources compiler:compile compiler:testCompile surefire:test -Dcucumber.features={{arg(name=\"feature\")}}"

[tasks."code:test-automation:run-by-tag"]
description = "Runs automation tests filtered by Cucumber tags."
run = "mvnd -f {{vars.pathSimplBackend}}/tests/test-automation resources:resources resources:testResources compiler:compile compiler:testCompile surefire:test -Dcucumber.filter.tags={{arg(name=\"tags\")}}"

[tasks."code:test-automation:restart-postgrest"]
shell = "bash -ec"
run = """
echo -e "Restart \\e[33mPostgREST\\e[0m deployments"
kubectl -n local-authority rollout restart $(kubectl -n local-authority get deployments -oname | grep postgrest)
"""

[tasks."code:test-automation:run-all"]
shell = "bash -c"
run = [
  { task = "code:test-automation:restart-postgrest" },
  "sleep 30",
  "mvnd -f {{vars.pathSimplBackend}}/tests/test-automation clean test allure:report",
]

[tasks."code:test-automation:allure-report-serve"]
run = "mvnd -f {{vars.pathSimplBackend}}/tests/test-automation allure:serve"

[tasks."cluster:k"]
run = "kubectl"

[tasks."code:test-automation:autoconfigure-client-secret"]
shell = "bash -ec"
run = [
"""
echo "Wait Keycloak"
{{vars.lib_keycloak}}
if ! waitkpod {{vars.keycloak_secrets_wait}}; then
    echo "Keycloak pod not ready."
    echo "Skipping initialization of secrets for automation testing."
    echo "Run manually: 'mise code:test-automation:autoconfigure-client-secret'"
    exit 0
fi

keylogin
secret_authority="$(getsecret authority)"
secret_onboarding="$(getsecret onboarding onboarding-sa)"
secret_testclient="$(getsecret authority test-client)"
secret_consumer="$(getsecret consumer)"
out={{vars.pathSimplBackend}}/tests/test-automation/src/test/resources/environments/environments-local.yaml

echo "Output file: $out"
echo "Secret authority: $secret_authority"
echo "Secret onboarding: $secret_onboarding"
echo "Secret test-client: $secret_testclient"
echo "Secret consumer: $secret_consumer"
yq eval '.environments[0].service-accounts[0].secret = "'$secret_authority'"' -i {{vars.pathSimplBackend}}/tests/test-automation/src/test/resources/environments/environments-local.yaml
yq eval '.environments[0].keycloak-service-accounts.applicant.secret = "'$secret_onboarding'"' -i {{vars.pathSimplBackend}}/tests/test-automation/src/test/resources/environments/environments-local.yaml
yq eval '.environments[0].keycloak-service-accounts.primary.secret = "'$secret_testclient'"' -i {{vars.pathSimplBackend}}/tests/test-automation/src/test/resources/environments/environments-local.yaml
yq eval '.environments[1].service-accounts[].secret = "'$secret_consumer'"' -i {{vars.pathSimplBackend}}/tests/test-automation/src/test/resources/environments/environments-local.yaml
""",
]

[tasks."cluster:forward-node-compose"]
description = "Runs the Docker Compose file for port forwarding."
run = "{{vars.run_cluster_forward_node_compose}}"

[tasks."cluster:forward-node-up"]
description = "Starts port forwarding services."
run = "{{vars.run_cluster_forward_node_compose}} up -d"

[tasks."cluster:redpanda:up"]
run = { task = "cluster:kube-redpanda-scale-1" }

[tasks."cluster:redpanda:down"]
run = { task = "cluster:kube-redpanda-scale-0" }

[tasks."simpl-services:compose"]
run = "docker-cli-plugin-docker-compose -p simpl-services --env-file=./simpl-services.env -f .config/docker/simpl-services/docker-compose.yaml"

[tasks."simpl-services:tier1-authority-up"]
run = "docker-cli-plugin-docker-compose -p simpl-services --env-file=./simpl-services.env -f .config/docker/simpl-services/docker-compose.yaml up -d tier1-gateway-authority"

[tasks."simpl-services:tier1-authority-restart"]
run = "docker-cli-plugin-docker-compose -p simpl-services --env-file=./simpl-services.env -f .config/docker/simpl-services/docker-compose.yaml restart tier1-gateway-authority"

[tasks."simpl-services:up"]
run = "docker-cli-plugin-docker-compose -p simpl-services --env-file=./simpl-services.env -f .config/docker/simpl-services/docker-compose.yaml up -d --pull=always"

[tasks."simpl-services:down"]
run = "docker-cli-plugin-docker-compose -p simpl-services --env-file=./simpl-services.env -f .config/docker/simpl-services/docker-compose.yaml down"

[tasks."simpl-services-fe:compose"]
run = "docker-cli-plugin-docker-compose -p simpl-services-fe --env-file=./simpl-services.env -f .config/docker/simpl-fe/docker-compose.yaml"

[tasks."simpl-services-fe:up"]
run = "docker-cli-plugin-docker-compose -p simpl-services-fe --env-file=./simpl-services.env -f .config/docker/simpl-fe/docker-compose.yaml up -d --pull=always"

[tasks."simpl-services-fe:down"]
run = "docker-cli-plugin-docker-compose -p simpl-services-fe --env-file=./simpl-services.env -f .config/docker/simpl-fe/docker-compose.yaml down"

[tasks."cluster:forward-node-down"]
description = "Shuts down all port forwards."
run = "{{vars.run_cluster_forward_node_compose}} down -v"

[tasks."cluster:install-ingress-addon"]
run = [
  "minikube --profile=simpl-control-plane addons enable ingress",
  "minikube --profile=simpl-control-plane addons enable ingress-dns",
]

[tasks."cluster:create"]
description = "Starts Minikube with a dedicated Docker network and profile."
run = "minikube start --namespace local-authority --network=simpl-network --driver=docker --profile=simpl-control-plane"

[tasks."cluster:destroy"]
description = "Deletes the Minikube cluster."
run = [
  { task = "cluster:forward-node-down" },
  "minikube delete --profile=simpl-control-plane",
  { task = "simpl-services:down" },
  { task = "simpl-services-fe:down" },
]

[tasks."cluster:start"]
description = "Starts the Minikube cluster and sets up port forwarding."
run = [
  { task = "cluster:forward-node-down" },
  "minikube start --namespace local-authority --network=simpl-network --driver=docker --profile=simpl-control-plane",
  { task = "cluster:forward-node-up" },
]

[tasks."cluster:status"]
description = "Shows the status of the Minikube cluster."
run = [
  "minikube status --profile=simpl-control-plane",
  { task = "cluster:forward-node-compose ps -a" },
]

[tasks."cluster:stop"]
description = "Stops the Minikube cluster and disables port forwarding."
run = [
  { task = "cluster:forward-node-down" },
  "minikube stop --profile=simpl-control-plane",
  { task = "simpl-services:down" },
  { task = "simpl-services-fe:down" },
]

[tasks."cluster:restart"]
run = [
  { task = "cluster:stop" },
  { task = "cluster:start" },
]

[tasks."simpl:start"]
run = [
  { task = "cluster:download_ejbca_pem" },
  { task = "simpl-services:up" },
  { task = "simpl-services-fe:up" },
]

[tasks."simpl:stop"]
run = [
  { task = "simpl-services:down" },
  { task = "simpl-services-fe:down" },
]

[tasks."simpl:restart"]
run = [
  { task = "simpl:stop" },
  { task = "simpl:start" },
]

[tasks."simpl:status"]
run = [
  { task = "simpl-services:compose ps -a" },
  { task = "simpl-services-fe:compose ps -a" },
]

[tasks."simpl:prune_and_init"]
run = [
  { task = "simpl:stop" },
  { task = "db:clean" },
  { task = "simpl:start" },
  { task = "cluster:authority_initialization" },
]

[tasks."services:status-all"]
quiet = true
shell = "bash -ec"
run = [
  "echo =================================; echo Backend services; echo =================================;",
  { task = "simpl-services:compose ps -a" },
  "echo;echo;echo =================================; echo Frontend services; echo =================================;",
  { task = "simpl-services-fe:compose ps -a" },
  "echo;echo;echo =================================; echo Cluster; echo =================================;",
  { task = "cluster:status" },
  "echo;echo;echo =================================; echo Kubernetes pods; echo =================================;",
  "kubectl -n local-authority get pod -o wide",
]

[tasks."cluster:bash"]
description = "Opens a shell inside the Minikube control plane container."
run = "docker exec -it simpl-control-plane bash"

[tasks."cluster:dashboard"]
run = "minikube -p simpl-control-plane dashboard"

[tasks."cluster:authority-install-or-upgrade"]
description = "Installs or upgrades the local authority Helm chart and switches namespace."
run = [
  """
  helm upgrade \
  -i \
  --dependency-update \
  --create-namespace \
  -n local-authority \
  --timeout 20m \
  --set keycloak.livenessProbe.enabled=false \
  --set-string postgrest.primary.initdb.scripts.restoreEjbca="" \
  local-authority \
  {{vars.pathHelmLocalAuthority}}
  """,
 "kubens local-authority",
]

[tasks."cluster:participant-fe-install-or-upgrade"]
run = [
  """
  helm upgrade \
  -i \
  --dependency-update \
  --create-namespace \
  -n local-participant-fe \
  local-participant-fe \
  {{config_root}}/helm-charts/simpl-frontend/local-participant/
  """,
 "kubens local-authority",
]

[tasks."cluster:authority-fe-install-or-upgrade"]
run = [
  """
  helm upgrade \
  -i \
  --dependency-update \
  --create-namespace \
  -n local-authority-fe \
  local-authority-fe \
  {{config_root}}/helm-charts/simpl-frontend/local-authority/
  """,
 "kubens local-authority",
]

[tasks."cluster:fe-mono-install-authority"]
run = "helm upgrade simpl-fe simpl-fe-charts/simpl-fe --version {{arg(name=\"version\")}} --values helm-charts/fe-values.yaml"

[tasks."cluster:fe-mono-install-participant"]
run = "helm upgrade simpl-fe simpl-fe-charts/simpl-fe --version {{arg(name=\"version\")}} --values helm-charts/fe-part-values.yaml"

[tasks."cluster:kube-redpanda-scale-0"]
run = [
    "kubectl -n local-authority scale statefulset.apps/local-authority --replicas 0",
    "kubectl -n local-authority scale deployment.apps/local-authority-console --replicas 0",
]

[tasks."cluster:kube-redpanda-scale-1"]
run = [
    "kubectl -n local-authority scale statefulset.apps/local-authority --replicas 1",
    "kubectl -n local-authority scale deployment.apps/local-authority-console --replicas 1",
]

[tasks."cluster:authority-uninstall"]
description = "Uninstalls the authority Helm chart."
run = "helm uninstall local-authority"

[tasks."cluster:pods"]
run = "kubectl get -n local-authority pod"

[tasks."cluster:deployments"]
run = "kubectl get -n local-authority deployments"

[tasks."cluster:keycloak-autoconfigure"]
run = [
  { task = "cluster:keycloak-clean-realms" },
  { task = "cluster:keycloak-realm-autoconfigure" },
  { task = "cluster:keycloak-base-autoconfigure" },
  { task = "cluster:keycloak-download-secret-onboarding-sa" },
]

[tasks."cluster:keycloak-base-autoconfigure"]
shell = "bash -ec"
run = """
{{vars.lib_keycloak}}
if ! waitkpod {{vars.keycloak_secrets_wait}} ; then
    echo "Keycloak pod not ready."
    echo "Skipping keycloak environment configuration"
    echo "Run manually: 'mise cluster:keycloak-base-autoconfigure'"
    exit 0
fi
keylogin
keycloak_update_attribute authority attributes.frontendUrl http://localhost:8100/auth
keycloak_update_attribute consumer attributes.frontendUrl http://localhost:8200/auth
"""

[tasks."cluster:keycloak-clean-realms"]
shell = "bash -ec"
run = """
echo "Wait Keycloak"
{{vars.lib_keycloak}}
if ! waitkpod {{vars.keycloak_secrets_wait}} ; then
    echo "Keycloak pod not ready."
    echo "Skipping keycloak clean realms"
    echo "Run manually: 'mise cluster:keycloak-clean-realms'"
    exit 0
fi

  echo "Delete realm onboarding"; kcadm_remote auth delete realms/onboarding || true
  echo "Delete realm authority"; kcadm_remote auth delete realms/authority || true
  echo "Delete realm consumer"; kcadm_remote auth delete realms/consumer || true
  echo "Delete realm participant"; kcadm_remote auth delete realms/participant || true
wait
"""

[tasks."cluster:keycloak-realm-autoconfigure"]
shell = "bash -ec"
run = """
DIR="simpl-repo/backend/misc/tier1-authentication/tools/keycloak-realm-configurator"
echo "Generate Realm"
for realm in authority participant onboarding; do
  echo "process realm=[$realm]"
  echo "Start keycloak-config-cli"
  try_n=0
  until try_n=$(( $try_n + 1 )) && env -C "$DIR" sh ./configure-realm.sh \\
    -CONFIG values/${realm}.yaml,values/test-default.yaml,values/eidas-default.yaml \\
    -URL http://localhost:8100/auth \\
    -USER admin \\
    -PASSWORD admin || [[ try_n == 3 ]]; do
    echo "Failed command. Repeate the command. ($(( try_n + 1 ))/3)"
  done
  if [[ try_n == 3 ]]; then
    echo "Unable to import realm $realm"
    exit 1;
  fi
done
"""

[tasks."cluster:keycloak-download-secret-onboarding-sa"]
shell = "bash -ec"
run = """
ENV_OUT=".config/docker/simpl-services/onboarding/keycloak-onboarding-secret-authority.env"
echo "Wait Keycloak"
{{vars.lib_keycloak}}
if ! waitkpod {{vars.keycloak_secrets_wait}} ; then
    echo "Keycloak pod not ready."
    echo "Skipping keycloak clean realms"
    echo "Run manually: 'mise run cluster:keycloak-download-secret-onboarding-sa'"
    exit 0
fi
secret="$(kcadm_remote auth get realms/onboarding/clients | jq -r '.[] | select(.clientId == "onboarding-sa").secret')"
echo Secret onboarding shell
secret_env="$(echo {} | secret="$secret" yq -oshell -pj '{"keycloak":{"service-account":{"client-secret":strenv(secret)}}}')"
echo "$secret_env > $ENV_OUT"
echo "$secret_env" > "$ENV_OUT"
"""

[tasks."zscaler:install-cluster"]
shell = "bash -ec"
description = "Installs Z-Scaler certificates inside the Minikube cluster."
run = [
"""
  {% if vars.zscaler_enabled %}
  docker cp .config/certs/zscaler-ca.pem simpl-control-plane:usr/local/share/ca-certificates/zscaler-ca.crt
  docker exec simpl-control-plane update-ca-certificates
  {% else %}
  echo "Skip z-scaler cluster installation"
  {% endif %}
"""
]

[tasks."git:init"]
description = "Initializes git submodules."
run = "git submodule init"

[tasks."git:update-all"]
description = "Updates all submodules recursively to the latest remote commits."
run = "git submodule update --recursive -N"

[tasks."micro:jar:download:all"]
run = [
{ tasks = [
  "micro:jar:download:authenticationprovider latest",
  "micro:jar:download:identityprovider latest",
  "micro:jar:download:onboarding latest",
  "micro:jar:download:securityattributesprovider latest",
  "micro:jar:download:tierone latest",
  "micro:jar:download:tiertwo latest",
  "micro:jar:download:usersroles latest",
  ]}
]

[tasks."micro:run:authority-authenticationprovider".env]
SPRING_PROFILES_ACTIVE = "local-authority"
CRYPTO_SECRETKEYBASE64 = "KdSucCE6DSRFThqxv2frvx1h84HPFEy4ocEFwFDJC8A"

[tasks."micro:coverage:download:authority-authenticationprovider"]
dir = "{{vars.pathSimplBackend}}/microservices/authentication_provider"
run = "jacoco dump --address localhost --port 6300 --destfile target/authority-jacoco.exec --reset"

[tasks."micro:run:authority-authenticationprovider"]
dir = "{{vars.pathSimplBackend}}/microservices/authentication_provider"
shell="bash -ec"
run = "bash -c 'java -javaagent:\"$(ls -1 $HOME/.m2/repository/org/jacoco/org.jacoco.agent/*/org.jacoco.agent-*-runtime.jar | sort -V | tail -n 1)\"=destfile=target/jacoco.exec,append=false,output=tcpserver,address=*,port=6300 -jar {{env.SIMPL_MICRO_JAR_AUTHENTICATIONPROVIDER}}'"
# run = "docker run --network host --name  authority-authenticationprovider --rm -m 400m -e \"SPRING_PROFILES_ACTIVE={{env.SPRING_PROFILES_ACTIVE}}\" -e \"CRYPTO_SECRETKEYBASE64={{env.CRYPTO_SECRETKEYBASE64}}\" {{env.SIMPL_DOCKER_MICRO_AUTHENTICATIONPROVIDER_IMAGE}}"
# run = "mvnd -Dmvnd.connectTimeout=100000 spring-boot:run"
[tasks."micro:jar:download:authenticationprovider"]
shell = "bash -ec"
dir = "{{vars.pathSimplBackend}}/microservices/authentication_provider"
run = """
IMAGE="code.europa.eu:4567/simpl/simpl-open/development/iaa/authentication_provider"
TAG={{arg(name=\"tag\")}}
{{vars.lib_extract_jar}}
simpl_extract_jar_from_image_to_file "$IMAGE:$TAG" target/app.jar
"""

