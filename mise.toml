[tasks."cluster:initialization_ejbca"]
shell = "bash -ec"
run = """
EJBCA_POD="$(kubectl -n local-authority get pod -o name --sort-by={.metadata.creationTimestamp} | grep ejbca-community-helm | tail -n1)"
DOCKER_DIR=".config/docker/simpl-services"
EJBCA_DOCKER_DIR="$DOCKER_DIR/ejbca"
IDENTITY_DOCKER_DIR="$DOCKER_DIR/identity-provider"
REMOTE_POD_CONFIG_DIR="/tmp/config"

until ready="$(kubectl -n local-authority get -oyaml "$EJBCA_POD" | yq '.status.containerStatuses[] | select(.name == "ejbca") | .ready')" && [ "$ready" == "true" ]; do
  echo "wait Ejbca. Ready=[$ready]"
  kubectl get -n local-authority "$EJBCA_POD"
  sleep 5;
done

echo "Ejbca ready. Start initialization"

kubectl exec -i "$EJBCA_POD" --  mkdir "$REMOTE_POD_CONFIG_DIR" || true

for line in "$EJBCA_DOCKER_DIR/config/"*; do
  FILE_NAME="$(basename "$line")"
  echo "Upload $line"
  cat "$line" | kubectl exec -i "$EJBCA_POD" -- sh -c "cat > $REMOTE_POD_CONFIG_DIR/$FILE_NAME"
done

echo "Start entrypoint script"

cat "$EJBCA_DOCKER_DIR/entrypoint.sh" | kubectl exec -i "$EJBCA_POD" -- sh -

TEMP=/tmp/t
if kubectl exec -i "$EJBCA_POD" --  cat /opt/keyfactor/p12/SuperAdmin.p12 > "$TEMP" ; then mv -v "$TEMP" "$IDENTITY_DOCKER_DIR/SuperAdmin.p12"; else "Skip download file SuperAdmin"; fi;
if kubectl exec -i "$EJBCA_POD" --  cat /opt/keyfactor/p12/truststore.jks > "$TEMP" ; then mv -v "$TEMP" "$IDENTITY_DOCKER_DIR/truststore.jks"; else "Skip download file truststore"; fi;
"""

[tasks."cluster:download_ejbca_pem"]
shell = "bash -ec"
run = """
OUTPUT_FILE=".config/docker/simpl-services/tier1-gateway/ejbca-local.pem"
HOST="localhost:30443"
echo "Download ejbca x509 from $HOST to $OUTPUT_FILE"
openssl s_client -connect "$HOST" -showcerts </dev/null 2>/dev/null | openssl x509 -outform PEM | tee "$OUTPUT_FILE"
"""

